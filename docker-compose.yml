version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_monitor
      POSTGRES_USER: agent_monitor
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agent_monitor_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel 后端 + 前端静态文件
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: agent_monitor
      DB_USERNAME: agent_monitor
      DB_PASSWORD: ${DB_PASSWORD:-agent_monitor_password}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    volumes:
      - app-storage:/var/www/storage
    ports:
      - "8000:9000"

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app-storage:/var/www/storage

volumes:
  pgdata:
  app-storage:
